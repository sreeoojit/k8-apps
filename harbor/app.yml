apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  destination:
    namespace: harbor
    server: https://kubernetes.default.svc

  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.17.0
    helm:
      valueFiles:
      - values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
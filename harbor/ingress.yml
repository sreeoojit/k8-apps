apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-ingress
  namespace: harbor

spec:
  ingressClassName: nginx

  rules:
  - host: harbor.gcloud.in

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: harbor-portal
            port:
              number: 80